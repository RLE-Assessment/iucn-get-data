# Default map styling for IUCN Global Ecosystem Typology levels.
# RGB color values [R, G, B] for each code at realm, biome, and
# functional group levels.

realms:
  # Core realms
  T: [34, 139, 34]       # forest green
  M: [0, 105, 180]       # ocean blue
  F: [70, 160, 220]      # sky blue
  S: [139, 90, 43]       # saddle brown
  # Transitional realms
  MT: [0, 128, 128]      # teal
  TF: [60, 150, 100]     # sea green
  FM: [30, 130, 200]     # steel blue
  MFT: [50, 140, 140]    # dark cyan
  SF: [100, 120, 140]    # slate gray-blue
  SM: [80, 100, 130]     # dark slate blue

biomes:
  # Terrestrial
  T1: [0, 100, 0]        # dark green – tropical-subtropical forests
  T2: [34, 139, 34]      # forest green – temperate-boreal forests
  T3: [154, 170, 60]     # olive – shrublands
  T4: [200, 190, 80]     # dark khaki – savannas & grasslands
  T5: [210, 180, 140]    # tan – deserts
  T6: [180, 200, 220]    # light steel blue – polar/alpine
  T7: [160, 120, 80]     # peru – intensive land-use
  # Marine
  M1: [0, 80, 160]       # dark blue – marine shelf
  M2: [30, 60, 140]      # medium blue – pelagic ocean
  M3: [20, 40, 100]      # navy – deep sea floors
  M4: [100, 130, 170]    # cadet blue – anthropogenic marine
  # Freshwater
  F1: [70, 130, 200]     # cornflower blue – rivers & streams
  F2: [100, 180, 220]    # light sky blue – lakes
  F3: [120, 160, 190]    # light blue-gray – artificial wetlands
  # Subterranean
  S1: [139, 90, 43]      # saddle brown – subterranean lithic
  S2: [120, 100, 80]     # dark tan – anthropogenic subterranean
  # Terrestrial-Freshwater
  TF1: [60, 150, 100]    # medium sea green – palustrine wetlands
  # Freshwater-Marine
  FM1: [30, 130, 200]    # dodger blue – semi-confined transitional
  # Marine-Freshwater-Terrestrial
  MFT1: [50, 140, 140]   # dark cyan – brackish tidal
  # Marine-Terrestrial
  MT1: [0, 140, 140]     # dark cyan – shorelines
  MT2: [60, 160, 120]    # medium aquamarine – supralittoral coastal
  MT3: [100, 140, 140]   # gray-teal – anthropogenic shorelines
  # Subterranean-Freshwater
  SF1: [80, 120, 160]    # steel blue – subterranean freshwaters
  SF2: [100, 120, 140]   # slate – anthropogenic subterranean freshwaters
  # Subterranean-Marine
  SM1: [80, 100, 130]    # dark slate – subterranean tidal

